<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 100px;
        }

        h1 {
            color: blue;
        }

        #count {
            font-size: 40px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Counter App</h1>

    <p id="count">0</p>

    <button id="btn">Increase</button>

    <script>
        let count = 0;

        const btn = document.getElementById("btn");
        const display = document.getElementById("count");

        btn.addEventListener("click", function () {
            count++;
            display.textContent = count;
        });
    </script>

</body>
</html>
